<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WAKE - Premium Streetwear</title>
    
    <!-- Meta Tags -->
    <meta property="og:image" content="https://files.catbox.moe/hujpgf.png">
    <meta property="og:title" content="WAKE - Premium Streetwear">
    <meta property="og:description" content="Découvrez la nouvelle collection WAKE">
    <link rel="icon" type="image/x-icon" href="https://files.catbox.moe/hujpgf.png">
    <link rel="apple-touch-icon" href="https://files.catbox.moe/hujpgf.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            
            /* Couleurs Light */
            --bg-primary: #fafafa;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-input: #f5f5f5;
            --text-primary: #1a1a2e;
            --text-secondary: #4a4a6a;
            --text-muted: #8a8aaa;
            --accent: #6c5ce7;
            --accent-hover: #5a4bd1;
            --accent-light: rgba(108, 92, 231, 0.1);
            --border: #e9ecef;
            --shadow: 0 2px 20px rgba(0,0,0,0.06);
            --shadow-hover: 0 8px 30px rgba(0,0,0,0.12);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
        }

        [data-theme="dark"] {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: #1e1e36;
            --bg-input: #2a2a44;
            --text-primary: #ffffff;
            --text-secondary: #c8c8d8;
            --text-muted: #8888aa;
            --border: #2d2d44;
            --shadow: 0 2px 20px rgba(0,0,0,0.3);
            --shadow-hover: 0 8px 30px rgba(0,0,0,0.5);
        }

        html {
            scroll-behavior: smooth;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-family);
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: var(--transition);
            padding-bottom: 90px;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 4px;
        }

        /* ===== HEADER ===== */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: var(--transition);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-brand {
            font-size: 24px;
            font-weight: 900;
            color: var(--accent);
            text-decoration: none;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-brand span {
            font-weight: 300;
            -webkit-text-fill-color: var(--text-secondary);
        }

        .header-actions {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .header-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: var(--bg-input);
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            position: relative;
            padding: 0;
        }

        .header-btn:hover {
            background: var(--accent-light);
            transform: scale(1.05);
        }

        .header-btn:active {
            transform: scale(0.95);
        }

        .header-btn svg {
            width: 22px;
            height: 22px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .notification-badge {
            position: absolute;
            top: -2px;
            right: -2px;
            background: var(--danger);
            color: white;
            border-radius: 50%;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            min-width: 18px;
            text-align: center;
            border: 2px solid var(--bg-secondary);
        }

        /* ===== SIDEBAR ===== */
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 199;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .sidebar-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: -320px;
            width: 320px;
            height: 100%;
            background: var(--bg-secondary);
            z-index: 200;
            padding: 0;
            transition: left 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
            box-shadow: var(--shadow-hover);
            display: flex;
            flex-direction: column;
        }

        .sidebar.active {
            left: 0;
        }

        .sidebar-header {
            padding: 20px 20px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h2 {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
        }

        .sidebar-close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: var(--bg-input);
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .sidebar-close:hover {
            background: var(--danger);
            color: white;
            transform: rotate(90deg);
        }

        .sidebar-close svg {
            width: 20px;
            height: 20px;
        }

        .sidebar-user {
            padding: 24px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .sidebar-user-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent);
            flex-shrink: 0;
        }

        .sidebar-user-info {
            flex: 1;
            min-width: 0;
        }

        .sidebar-user-info h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar-user-info p {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar-user-info .badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 20px;
            background: var(--accent-light);
            color: var(--accent);
            margin-top: 4px;
        }

        .sidebar-nav {
            flex: 1;
            padding: 12px 12px 20px;
            list-style: none;
            overflow-y: auto;
        }

        .sidebar-nav li {
            margin-bottom: 2px;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            text-decoration: none;
            color: var(--text-secondary);
            transition: var(--transition);
            font-weight: 500;
            font-size: 14px;
        }

        .sidebar-nav a:hover {
            background: var(--accent-light);
            color: var(--accent);
        }

        .sidebar-nav a.active {
            background: var(--accent);
            color: white;
        }

        .sidebar-nav a svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .sidebar-nav .divider {
            height: 1px;
            background: var(--border);
            margin: 8px 16px;
        }

        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-muted);
        }

        .sidebar-footer .referral {
            font-weight: 600;
            color: var(--accent);
        }

        /* ===== SEARCH BAR ===== */
        .search-bar {
            padding: 12px 16px;
            position: sticky;
            top: 64px;
            z-index: 10;
            background: var(--bg-primary);
            transition: var(--transition);
        }

        .search-bar-inner {
            position: relative;
        }

        .search-bar-inner svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            color: var(--text-muted);
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        .search-bar input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            border-radius: var(--radius);
            border: 2px solid var(--border);
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 15px;
            font-family: var(--font-family);
            transition: var(--transition);
            outline: none;
        }

        .search-bar input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-light);
        }

        .search-bar input::placeholder {
            color: var(--text-muted);
        }

        /* ===== CATEGORY TABS ===== */
        .category-tabs {
            display: flex;
            gap: 8px;
            padding: 0 16px 12px;
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            position: sticky;
            top: 116px;
            z-index: 9;
            background: var(--bg-primary);
            transition: var(--transition);
        }

        .category-tabs::-webkit-scrollbar {
            display: none;
        }

        .category-tab {
            padding: 8px 20px;
            border-radius: 20px;
            border: 2px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            white-space: nowrap;
            cursor: pointer;
            transition: var(--transition);
            font-size: 13px;
            font-weight: 600;
            font-family: var(--font-family);
            flex-shrink: 0;
        }

        .category-tab:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .category-tab.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* ===== PRODUCTS GRID ===== */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 0 16px 16px;
        }

        .product-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid var(--border);
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
            border-color: var(--accent);
        }

        .product-card:active {
            transform: scale(0.98);
        }

        .product-card .image-wrapper {
            position: relative;
            padding-top: 100%;
            background: var(--bg-input);
            overflow: hidden;
        }

        .product-card .image-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }

        .product-card:hover .image-wrapper img {
            transform: scale(1.05);
        }

        .product-card .discount-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: var(--danger);
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 20px;
        }

        .product-card .stock-badge {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(0,0,0,0.7);
            color: white;
            font-size: 10px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .product-card .info {
            padding: 12px;
        }

        .product-card .info h4 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 2px;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-card .info .price-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
        }

        .product-card .info .price {
            font-weight: 700;
            color: var(--accent);
            font-size: 15px;
        }

        .product-card .info .old-price {
            text-decoration: line-through;
            color: var(--text-muted);
            font-size: 12px;
        }

        .product-card .info .category-tag {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        /* ===== FLOATING CART ===== */
        .cart-floating {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 50;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(108, 92, 231, 0.4);
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .cart-floating:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 30px rgba(108, 92, 231, 0.5);
        }

        .cart-floating:active {
            transform: scale(0.92);
        }

        .cart-floating svg {
            width: 26px;
            height: 26px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }

        .cart-floating .badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: var(--danger);
            color: white;
            border-radius: 50%;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            min-width: 22px;
            text-align: center;
            border: 2px solid var(--accent);
        }

        /* ===== NOTIFICATIONS PANEL ===== */
        .notifications-panel {
            position: fixed;
            top: 72px;
            right: 12px;
            width: 340px;
            max-height: 420px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-hover);
            z-index: 150;
            display: none;
            overflow: hidden;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .notifications-panel.active {
            display: block;
        }

        .notifications-panel-header {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .notifications-panel-header h4 {
            font-size: 15px;
            font-weight: 600;
        }

        .notifications-panel-header button {
            background: none;
            border: none;
            color: var(--accent);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            font-family: var(--font-family);
            transition: var(--transition);
        }

        .notifications-panel-header button:hover {
            color: var(--accent-hover);
        }

        .notifications-list {
            max-height: 340px;
            overflow-y: auto;
            padding: 8px;
        }

        .notification-item {
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            margin-bottom: 4px;
            transition: var(--transition);
            cursor: pointer;
        }

        .notification-item:hover {
            background: var(--bg-input);
        }

        .notification-item.unread {
            background: var(--accent-light);
            border-left: 3px solid var(--accent);
        }

        .notification-item .title {
            font-weight: 600;
            font-size: 13px;
        }

        .notification-item .message {
            font-size: 12px;
            color: var(--text-secondary);
            margin: 2px 0;
        }

        .notification-item .time {
            font-size: 10px;
            color: var(--text-muted);
        }

        .notification-empty {
            text-align: center;
            padding: 30px 16px;
            color: var(--text-muted);
        }

        .notification-empty svg {
            width: 40px;
            height: 40px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        /* ===== LOADING ===== */
        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            grid-column: 1 / -1;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 4px solid var(--border);
            border-top-color: var(--accent);
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== RESPONSIVE ===== */
        @media (min-width: 640px) {
            .products-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 16px;
                padding: 0 24px 24px;
            }
            
            .search-bar {
                padding: 16px 24px;
            }
            
            .category-tabs {
                padding: 0 24px 16px;
            }
        }

        @media (min-width: 1024px) {
            .products-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 20px;
                padding: 0 32px 32px;
                max-width: 1200px;
                margin: 0 auto;
            }
            
            .search-bar {
                padding: 16px 32px;
                max-width: 1200px;
                margin: 0 auto;
            }
            
            .category-tabs {
                padding: 0 32px 16px;
                max-width: 1200px;
                margin: 0 auto;
            }

            .sidebar {
                width: 360px;
                left: -360px;
            }
        }

        @media (max-width: 480px) {
            .notifications-panel {
                right: 8px;
                left: 8px;
                width: auto;
            }

            .product-card .info h4 {
                font-size: 13px;
            }

            .product-card .info .price {
                font-size: 14px;
            }

            .header-brand {
                font-size: 20px;
            }
        }

        /* ===== UTILITIES ===== */
        .hidden {
            display: none !important;
        }

        .text-center {
            text-align: center;
        }

        .mt-8 { margin-top: 8px; }
        .mt-12 { margin-top: 12px; }
        .mt-16 { margin-top: 16px; }

        .gap-8 { gap: 8px; }
        .gap-12 { gap: 12px; }
        .gap-16 { gap: 16px; }

        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .flex-1 { flex: 1; }

        .w-full { width: 100%; }
    </style>
</head>
<body>
    <!-- ===== HEADER ===== -->
    <header class="header" id="appHeader">
        <div class="header-left">
            <button class="header-btn" onclick="toggleSidebar()" aria-label="Menu">
                <svg viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
            </button>
            <a href="/" class="header-brand">WAKE<span>.</span></a>
        </div>
        <div class="header-actions">
            <button class="header-btn" onclick="window.location.href='/shop'" aria-label="Boutique">
                <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
            </button>
            <button class="header-btn" onclick="toggleNotifications()" aria-label="Notifications">
                <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                <span class="notification-badge" id="notifCount">0</span>
            </button>
            <button class="header-btn" onclick="window.location.href='/profile'" aria-label="Profil">
                <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </button>
        </div>
    </header>

    <!-- ===== SIDEBAR OVERLAY ===== -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>WAKE</h2>
            <button class="sidebar-close" onclick="toggleSidebar()">
                <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>

        <div class="sidebar-user" id="sidebarUser">
            <img class="sidebar-user-avatar" id="userAvatar" src="https://ui-avatars.com/api/?name=U&background=6c5ce7&color=fff&size=56" alt="Avatar">
            <div class="sidebar-user-info">
                <h3 id="userName">Utilisateur</h3>
                <p id="userEmail">email@example.com</p>
                <span class="badge" id="userRole">Utilisateur</span>
            </div>
        </div>

        <nav class="sidebar-nav" id="sidebarNav">
            <li><a href="/" class="active" data-i18n="nav.home">
                <svg viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1"/></svg>

            </a></li>

            </a></li>

                Support
            </a></li>
            <li><a href="/about" data-i18n="nav.about">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                À propos
            </a></li>
            <li class="divider"></li>

                <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>

            </a></li>
            <li><a href="/settings" data-i18n="nav.settings">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>

                <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Déconnexion
            </a></li>

        <div class="sidebar-footer">
            <p>WAKE v1.0</p>
            <p>Code de parrainage: <span class="referral" id="sidebarReferral">WAKE-XXXX</span></p>
        </div>
    </aside>

    <!-- ===== NOTIFICATIONS PANEL ===== -->
    <div class="notifications-panel" id="notificationsPanel">
        <div class="notifications-panel-header">
            <h4 data-i18n="notifications.title">Notifications</h4>
            <button onclick="markAllRead()" data-i18n="notifications.readAll">Tout lire</button>
        </div>
        <div class="notifications-list" id="notificationsList">
            <div class="notification-empty">
                <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                <p data-i18n="notifications.empty">Aucune notification</p>
            </div>
        </div>
    </div>

    <!-- ===== SEARCH BAR ===== -->
    <div class="search-bar">
        <div class="search-bar-inner">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="searchInput" placeholder="Rechercher un article..." oninput="searchProducts(this.value)">
        </div>
    </div>

    <!-- ===== CATEGORY TABS ===== -->
    <div class="category-tabs" id="categoryTabs">
        <button class="category-tab active" data-category="all" onclick="filterCategory('all')">Tout</button>
    </div>

    <!-- ===== PRODUCTS GRID ===== -->
    <div class="products-grid" id="productsGrid">
        <div class="loading-spinner">
            <div class="spinner"></div>
        </div>
    </div>

    <!-- ===== FLOATING CART ===== -->
    <button class="cart-floating" onclick="window.location.href='/cart'" aria-label="Panier">
        <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="badge" id="cartBadge">0</span>
    </button>

    <script>
        // ============================================
        // APPLICATION STATE
        // ============================================
        const state = {
            user: null,
            products: [],
            categories: [],
            cart: [],
            notifications: [],
            unreadCount: 0,
            currentCategory: 'all',
            language: 'fr',
            theme: 'light',
            isAuthenticated: false
        };

        // ============================================
        // I18N SYSTEM
        // ============================================
        const i18n = {
            translations: {},
            
            async init() {
                try {
                    const res = await fetch('/api/translations');
                    if (res.ok) {
                        const data = await res.json();
                        this.translations = data.translations || {};
                    }
                } catch (e) {
                    console.error('Erreur chargement traductions:', e);
                }
            },
            
            t(key, lang = null) {
                const currentLang = lang || state.language;
                const translation = this.translations[key];
                if (!translation) return key;
                return translation[currentLang] || translation.fr || key;
            },
            
            async updateLanguage(lang) {
                state.language = lang;
                if (state.user) {
                    await fetch('/api/user/language', {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ language: lang })
                    });
                }
                localStorage.setItem('wake_language', lang);
                this.applyTranslations();
            },
            
            applyTranslations() {
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.dataset.i18n;
                    el.textContent = this.t(key);
                });
            }
        };

        // ============================================
        // THEME SYSTEM
        // ============================================
        const theme = {
            init() {
                const saved = localStorage.getItem('wake_theme') || 'light';
                state.theme = saved;
                this.apply(saved);
            },
            
            apply(theme) {
                document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'dark' : '');
                state.theme = theme;
                localStorage.setItem('wake_theme', theme);
            },
            
            toggle() {
                const next = state.theme === 'light' ? 'dark' : 'light';
                this.apply(next);
                if (state.user) {
                    fetch('/api/user/theme', {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ theme: next })
                    });
                }
            }
        };

        // ============================================
        // AUTH
        // ============================================
        async function checkAuth() {
            try {
                const res = await fetch('/api/auth/me');
                if (res.ok) {
                    const data = await res.json();
                    state.user = data.user;
                    state.isAuthenticated = true;
                    
                    // Restaurer les préférences
                    if (data.user.language) {
                        state.language = data.user.language;
                        localStorage.setItem('wake_language', data.user.language);
                    }
                    if (data.user.theme) {
                        theme.apply(data.user.theme);
                    }
                    
                    updateUserUI();
                    return true;
                }
                return false;
            } catch (error) {
                console.error('Erreur auth:', error);
                return false;
            }
        }

        function updateUserUI() {
            const user = state.user;
            if (!user) {
                document.querySelector('.sidebar-user').innerHTML = `
                    <div style="padding:20px;text-align:center;width:100%;">
                        <p style="color:var(--text-secondary);margin-bottom:12px;">Connectez-vous pour accéder à toutes les fonctionnalités</p>
                        <a href="/login" style="display:inline-block;padding:10px 24px;background:var(--accent);color:white;border-radius:var(--radius-sm);text-decoration:none;font-weight:600;font-size:14px;">Se connecter</a>
                        <a href="/register" style="display:inline-block;padding:10px 24px;margin-left:8px;background:transparent;color:var(--text-secondary);border:2px solid var(--border);border-radius:var(--radius-sm);text-decoration:none;font-weight:600;font-size:14px;">S'inscrire</a>
                    </div>
                `;
                document.getElementById('sidebarNav').querySelector('[data-i18n="nav.logout"]').style.display = 'none';
                return;
            }

            document.getElementById('userName').textContent = user.name || 'Utilisateur';
            document.getElementById('userEmail').textContent = user.email;
            document.getElementById('sidebarReferral').textContent = user.referral_code || 'WAKE-XXXX';
            document.getElementById('userRole').textContent = user.role === 'admin' ? 'Admin' : 'Membre';
            
            if (user.avatar) {
                document.getElementById('userAvatar').src = user.avatar;
            }

            // Afficher le lien admin si admin
            const adminLink = document.querySelector('[href="/admin/dashboard"]');
            if (user.role === 'admin') {
                if (!adminLink) {
                    const nav = document.getElementById('sidebarNav');
                    const divider = nav.querySelector('.divider');
                    const li = document.createElement('li');
                    li.innerHTML = `<a href="/admin/dashboard" style="color:var(--accent);font-weight:600;">
                        <svg viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1"/></svg>
                        Administration
                    </a></li>`;
                    divider.parentNode.insertBefore(li, divider.nextSibling);
                }
            }
        }

        async function logout() {
            if (confirm('Voulez-vous vraiment vous déconnecter ?')) {
                try {
                    await fetch('/api/auth/logout', { method: 'POST' });
                    state.isAuthenticated = false;
                    state.user = null;
                    window.location.href = '/login';
                } catch (error) {
                    console.error('Erreur déconnexion:', error);
                }
            }
        }

        // ============================================
        // PRODUCTS
        // ============================================
        async function loadProducts() {
            try {
                const url = state.currentCategory === 'all' 
                    ? '/api/products' 
                    : `/api/products?category=${encodeURIComponent(state.currentCategory)}`;
                const res = await fetch(url);
                if (res.ok) {
                    const data = await res.json();
                    state.products = data.products || [];
                    renderProducts();
                }
            } catch (error) {
                console.error('Erreur chargement produits:', error);
                document.getElementById('productsGrid').innerHTML = `
                    <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);">
                        <p style="font-size:40px;margin-bottom:8px;">⚠️</p>
                        <p>Erreur de chargement. Veuillez réessayer.</p>
                        <button onclick="loadProducts()" style="margin-top:12px;padding:8px 24px;background:var(--accent);color:white;border:none;border-radius:var(--radius-sm);cursor:pointer;">Réessayer</button>
                    </div>
                `;
            }
        }

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            const products = state.products;
            
            if (!products || products.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);">
                        <p style="font-size:40px;margin-bottom:8px;">🛍️</p>
                        <p>Aucun produit disponible</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = products.map(product => {
                const price = product.discount > 0 
                    ? product.price - (product.price * product.discount / 100)
                    : product.price;
                const hasDiscount = product.discount > 0;
                
                return `
                    <div class="product-card" onclick="viewProduct('${product.id}')">
                        <div class="image-wrapper">
                            <img src="${product.images && product.images[0] ? product.images[0] : 'https://placehold.co/400x400/6c5ce7/fff?text=WAKE'}" 
                                 alt="${product.name}" 
                                 loading="lazy"
                                 onerror="this.src='https://placehold.co/400x400/6c5ce7/fff?text=WAKE'">
                            ${hasDiscount ? `<span class="discount-badge">-${product.discount}%</span>` : ''}
                            ${product.is_limited && product.stock !== null && product.stock <= 5 ? 
                                `<span class="stock-badge">⚠️ Stock limité (${product.stock})</span>` : ''}
                        </div>
                        <div class="info">
                            <span class="category-tag">${product.category || 'Général'}</span>
                            <h4>${product.name}</h4>
                            <div class="price-row">
                                <span class="price">${Math.round(price)} XAF</span>
                                ${hasDiscount ? `<span class="old-price">${Math.round(product.price)} XAF</span>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterCategory(category) {
            state.currentCategory = category;
            document.querySelectorAll('.category-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.category === category);
            });
            loadProducts();
        }

        function searchProducts(query) {
            if (!query.trim()) {
                renderProducts();
                return;
            }
            const filtered = state.products.filter(p => 
                p.name.toLowerCase().includes(query.toLowerCase()) ||
                (p.description && p.description.toLowerCase().includes(query.toLowerCase()))
            );
            const grid = document.getElementById('productsGrid');
            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);">
                        <p style="font-size:40px;margin-bottom:8px;">🔍</p>
                        <p>Aucun résultat pour "${query}"</p>
                    </div>
                `;
            } else {
                renderProducts(filtered);
            }
        }

        function viewProduct(productId) {
            window.location.href = `/product/${productId}`;
        }

        // ============================================
        // CATEGORIES
        // ============================================
        async function loadCategories() {
            try {
                const res = await fetch('/api/categories');
                if (res.ok) {
                    const data = await res.json();
                    state.categories = data.categories || [];
                    renderCategories();
                }
            } catch (error) {
                console.error('Erreur chargement catégories:', error);
            }
        }

        function renderCategories() {
            const container = document.getElementById('categoryTabs');
            const allBtn = container.querySelector('[data-category="all"]');
            container.innerHTML = '';
            container.appendChild(allBtn);
            
            state.categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'category-tab';
                btn.dataset.category = cat.name;
                btn.innerHTML = `${cat.icon || '📁'} ${cat.name}`;
                btn.onclick = () => filterCategory(cat.name);
                container.appendChild(btn);
            });
        }

        // ============================================
        // CART
        // ============================================
        async function loadCart() {
            if (!state.isAuthenticated) {
                document.getElementById('cartBadge').textContent = '0';
                return;
            }
            try {
                const res = await fetch('/api/cart');
                if (res.ok) {
                    const data = await res.json();
                    state.cart = data.cart || [];
                    updateCartBadge();
                }
            } catch (error) {
                console.error('Erreur chargement panier:', error);
            }
        }

        function updateCartBadge() {
            const total = state.cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartBadge').textContent = total;
        }

        // ============================================
        // NOTIFICATIONS
        // ============================================
        async function loadNotifications() {
            if (!state.isAuthenticated) return;
            try {
                const res = await fetch('/api/notifications');
                if (res.ok) {
                    const data = await res.json();
                    state.notifications = data.notifications || [];
                    state.unreadCount = data.unreadCount || 0;
                    document.getElementById('notifCount').textContent = state.unreadCount;
                    renderNotifications();
                }
            } catch (error) {
                console.error('Erreur chargement notifications:', error);
            }
        }

        function renderNotifications() {
            const list = document.getElementById('notificationsList');
            const notifs = state.notifications;
            
            if (!notifs || notifs.length === 0) {
                list.innerHTML = `
                    <div class="notification-empty">
                        <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                        <p data-i18n="notifications.empty">Aucune notification</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = notifs.map(notif => `
                <div class="notification-item ${!notif.is_read ? 'unread' : ''}" onclick="markNotificationRead('${notif.id}')">
                    <div class="title">${notif.title}</div>
                    <div class="message">${notif.message}</div>
                    <div class="time">${new Date(notif.created_at).toLocaleDateString()} ${new Date(notif.created_at).toLocaleTimeString()}</div>
                </div>
            `).join('');
        }

        async function markNotificationRead(notifId) {
            try {
                await fetch(`/api/notifications/${notifId}`, { method: 'PUT' });
                loadNotifications();
            } catch (error) {
                console.error('Erreur:', error);
            }
        }

        async function markAllRead() {
            try {
                await fetch('/api/notifications/read-all', { method: 'PUT' });
                loadNotifications();
            } catch (error) {
                console.error('Erreur:', error);
            }
        }

        function toggleNotifications() {
            const panel = document.getElementById('notificationsPanel');
            panel.classList.toggle('active');
            if (panel.classList.contains('active')) {
                loadNotifications();
            }
        }

        // ============================================
        // SIDEBAR
        // ============================================
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
            document.body.style.overflow = sidebar.classList.contains('active') ? 'hidden' : '';
        }

        // Fermer la sidebar en cliquant en dehors
        document.addEventListener('click', (e) => {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            if (sidebar.classList.contains('active') && !sidebar.contains(e.target) && e.target !== document.querySelector('.header-btn')) {
                toggleSidebar();
            }
        });

        // ============================================
        // PWA INSTALLATION
        // ============================================
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            showInstallBanner();
        });

        function showInstallBanner() {
            const existing = document.getElementById('installBanner');
            if (existing) return;

            const banner = document.createElement('div');
            banner.id = 'installBanner';
            banner.style.cssText = `
                position: fixed;
                bottom: 90px;
                left: 16px;
                right: 16px;
                background: var(--bg-card);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 16px;
                box-shadow: var(--shadow-hover);
                z-index: 60;
                display: flex;
                align-items: center;
                gap: 12px;
                animation: slideUp 0.4s ease;
            `;
            banner.innerHTML = `
                <div style="width:48px;height:48px;border-radius:12px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;">📱</div>
                <div style="flex:1;">
                    <strong style="font-size:14px;">Installer WAKE</strong>
                    <p style="font-size:12px;color:var(--text-secondary);">Ajoutez WAKE à votre écran d'accueil</p>
                </div>
                <button onclick="installApp()" style="padding:8px 16px;background:var(--accent);color:white;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:13px;">Installer</button>
                <button onclick="this.parentElement.remove()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-muted);padding:0 4px;">✕</button>
            `;
            document.body.appendChild(banner);
        }

        function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('App installée');
                    }
                    deferredPrompt = null;
                    document.getElementById('installBanner')?.remove();
                });
            }
        }

        // Animation pour le banner
        const styleSheet = document.createElement('style');
        styleSheet.textContent = `
            @keyframes slideUp {
                from { opacity: 0; transform: translateY(20px); }
                to { opacity: 1; transform: translateY(0); }
            }
        `;
        document.head.appendChild(styleSheet);

        // ============================================
        // INIT
        // ============================================
        async function init() {
            // Thème
            theme.init();
            
            // I18n
            await i18n.init();
            const savedLang = localStorage.getItem('wake_language') || 'fr';
            state.language = savedLang;
            i18n.applyTranslations();
            
            // Auth
            await checkAuth();
            
            // Données
            await loadCategories();
            await loadProducts();
            await loadCart();
            await loadNotifications();
            
            // Polling notifications toutes les 30s
            setInterval(() => {
                if (state.isAuthenticated) loadNotifications();
            }, 30000);
            
            console.log('🚀 WAKE Shop chargé avec succès !');
            console.log(`📱 Mode: ${state.isAuthenticated ? 'Connecté' : 'Invité'}`);
            console.log(`🌐 Langue: ${state.language}`);
            console.log(`🎨 Thème: ${state.theme}`);
        }

        // Démarrer l'application
        document.addEventListener('DOMContentLoaded', init);

        // ============================================
        // EXPOSE GLOBAL
