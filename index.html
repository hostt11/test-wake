<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - WAKE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
        :root {
            --bg:#f5f5f5;
            --card:#ffffff;
            --text:#1a1a1a;
            --border:#e0e0e0;
            --primary:#1a1a1a;
            --primary-hover:#333;
            --input-bg:#fafafa;
        }
        .dark {
            --bg:#121212;
            --card:#1e1e1e;
            --text:#f0f0f0;
            --border:#333;
            --primary:#f0f0f0;
            --primary-hover:#ccc;
            --input-bg:#2a2a2a;
        }
        body { background:var(--bg); display:flex; justify-content:center; align-items:center; min-height:100vh; padding:20px; }
        .auth-container { background:var(--card); border-radius:16px; padding:40px 32px; width:100%; max-width:400px; box-shadow:0 8px 40px rgba(0,0,0,0.08); }
        .logo { text-align:center; font-size:28px; font-weight:800; letter-spacing:2px; color:var(--text); margin-bottom:32px; }
        .logo span { background:#000; color:#fff; padding:4px 12px; border-radius:4px; }
        h1 { font-size:24px; color:var(--text); margin-bottom:8px; }
        .subtitle { color:#888; font-size:14px; margin-bottom:24px; }
        .form-group { margin-bottom:16px; }
        .form-group label { display:block; font-size:13px; font-weight:600; color:var(--text); margin-bottom:6px; }
        .form-group input { width:100%; padding:12px 14px; border:1.5px solid var(--border); border-radius:10px; font-size:14px; background:var(--input-bg); color:var(--text); outline:none; transition:0.2s; }
        .form-group input:focus { border-color:var(--primary); }
        .password-wrapper { position:relative; }
        .password-wrapper input { padding-right:44px; }
        .password-wrapper .toggle-pass { position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; color:#888; cursor:pointer; font-size:16px; }
        .options { display:flex; justify-content:space-between; align-items:center; margin:16px 0 24px; }
        .options label { font-size:13px; color:var(--text); display:flex; align-items:center; gap:8px; cursor:pointer; }
        .options a { color:var(--primary); text-decoration:none; font-size:13px; font-weight:600; }
        .btn-primary { width:100%; padding:14px; background:var(--primary); color:#fff; border:none; border-radius:10px; font-size:16px; font-weight:700; cursor:pointer; transition:0.2s; }
        .btn-primary:hover { opacity:0.85; }
        .btn-google { width:100%; padding:12px; background:var(--card); color:var(--text); border:1.5px solid var(--border); border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; margin-top:12px; transition:0.2s; }
        .btn-google:hover { background:var(--bg); }
        .divider { display:flex; align-items:center; margin:20px 0; gap:12px; }
        .divider hr { flex:1; border:none; border-top:1px solid var(--border); }
        .divider span { color:#888; font-size:12px; text-transform:uppercase; letter-spacing:1px; }
        .footer-text { text-align:center; font-size:14px; color:#888; margin-top:20px; }
        .footer-text a { color:var(--primary); font-weight:600; text-decoration:none; }
        .error-msg { color:#e74c3c; font-size:13px; margin-top:4px; display:none; }
        .success-msg { color:#27ae60; font-size:13px; margin-top:4px; display:none; }
        .dark .btn-google { background:#2a2a2a; }
        .dark .btn-google:hover { background:#333; }
        .dark .logo span { background:#fff; color:#000; }
    </style>
</head>
<body>

<div class="auth-container" id="app">
    <div class="logo">WA<span>KE</span></div>

    <h1>Connexion</h1>
    <p class="subtitle">Connectez-vous à votre compte WAKE</p>

    <form id="loginForm">
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="vous@exemple.com" required>
        </div>

        <div class="form-group">
            <label>Mot de passe</label>
            <div class="password-wrapper">
                <input type="password" id="password" placeholder="••••••••" required>
                <button type="button" class="toggle-pass" onclick="togglePassword()">
                    <i class="fa-regular fa-eye"></i>
                </button>
            </div>
        </div>

        <div class="options">
            <label>
                <input type="checkbox" id="remember"> Se souvenir de moi
            </label>
            <a href="forgot-password.html">Mot de passe oublié ?</a>
        </div>

        <div id="errorMsg" class="error-msg"></div>

        <button type="submit" class="btn-primary">Se connecter</button>

        <div class="divider">
            <hr><span>ou</span><hr>
        </div>

        <button type="button" class="btn-google" onclick="loginWithGoogle()">
            <i class="fa-brands fa-google"></i> Continuer avec Google
        </button>
    </form>

    <p class="footer-text">
        Pas encore de compte ? <a href="register.html">S'inscrire</a>
    </p>
</div>

<script src="../js/supabase.js"></script>
<script>
    // ===== THÈME + LANGUE PERSISTANTS =====
    function applyTheme(theme) {
        document.documentElement.className = theme;
        localStorage.setItem('wake-theme', theme);
        const icon = document.querySelector('.theme-toggle i');
        if(icon) icon.className = theme === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
    }

    function getTheme() {
        return localStorage.getItem('wake-theme') || 'light';
    }

    function toggleTheme() {
        const current = getTheme();
        applyTheme(current === 'dark' ? 'light' : 'dark');
    }

    // Appliquer thème au chargement
    applyTheme(getTheme());

    // ===== TOGGLE PASSWORD =====
    function togglePassword() {
        const input = document.getElementById('password');
        const icon = document.querySelector('.toggle-pass i');
        if(input.type === 'password') {
            input.type = 'text';
            icon.className = 'fa-regular fa-eye-slash';
        } else {
            input.type = 'password';
            icon.className = 'fa-regular fa-eye';
        }
    }

    // ===== LOGIN =====
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('errorMsg');

        errorMsg.style.display = 'none';

        try {
            const { data, error } = await supabase.auth.signInWithPassword({
                email, password
            });

            if(error) throw error;

            window.location.href = '../index.html';
        } catch(err) {
            errorMsg.textContent = err.message || 'Erreur de connexion';
            errorMsg.style.display = 'block';
        }
    });

    // ===== LOGIN GOOGLE =====
    async function loginWithGoogle() {
        try {
            const { data, error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin + '/index.html' }
            });
            if(error) throw error;
        } catch(err) {
            alert(err.message);
        }
    }
</script>

</body>
</html>
